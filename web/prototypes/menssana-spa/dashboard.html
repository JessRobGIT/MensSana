<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2d6a4f" />
  <title>MensSana – Dashboard</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>

  <!-- ── LOGIN ───────────────────────────────────────────── -->
  <div id="login-view">
    <div class="login-card">
      <div class="login-logo">
        <h1>MensSana</h1>
        <p>Caregiver-Dashboard</p>
      </div>
      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">E-Mail-Adresse</label>
          <input type="email" id="email" autocomplete="email"
                 placeholder="ihre@email.de" required />
        </div>
        <div class="form-group">
          <label for="password">Passwort</label>
          <input type="password" id="password" autocomplete="current-password"
                 placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary" id="login-btn">Anmelden</button>
        <p class="status-msg" id="login-status" role="alert"></p>
      </form>
    </div>
  </div>

  <!-- ── DASHBOARD ───────────────────────────────────────── -->
  <div id="dashboard-view" class="hidden">

    <header class="dash-header">
      <h1>MensSana <span class="dash-label">Dashboard</span></h1>
      <div class="dash-header-right">
        <span id="dash-user"></span>
        <span id="dash-role-badge" class="dash-role-badge hidden"></span>
        <button class="btn-outline" id="logout-btn">Abmelden</button>
      </div>
    </header>

    <main class="dash-main">

      <!-- User list -->
      <section id="users-section">
        <h2 class="section-title">Betreute Personen</h2>
        <div id="users-grid" class="users-grid"></div>
        <p id="users-empty" class="empty-msg hidden">
          Keine betreuten Personen zugewiesen. Bitte in Supabase eine Zuweisung anlegen.
        </p>
      </section>

      <!-- Detail panel -->
      <section id="detail-panel" class="hidden">
        <div class="detail-header">
          <button class="btn-back" id="detail-back">← Übersicht</button>
          <h2 id="detail-name"></h2>
        </div>

        <div class="detail-grid">

          <div class="detail-card">
            <h3>Stimmung — letzte 7 Tage</h3>
            <div id="mood-chart" class="mood-chart"></div>
            <div id="mood-meta" class="mood-meta"></div>
          </div>

          <div class="detail-card">
            <h3>Letzte Gespräche</h3>
            <div id="conv-list" class="detail-list"></div>
          </div>

          <div class="detail-card">
            <h3>Medikamente
              <button class="detail-add-btn" id="dash-med-add-btn">+ Hinzufügen</button>
            </h3>
            <div id="meds-list" class="detail-list"></div>
          </div>

          <div class="detail-card">
            <h3>Termine
              <button class="detail-add-btn" id="dash-cal-add-btn">+ Hinzufügen</button>
            </h3>
            <div class="dash-mini-cal-nav">
              <button class="dmg-nav-btn" id="dash-cal-prev">&#8249;</button>
              <span id="dash-cal-month-title"></span>
              <button class="dmg-nav-btn" id="dash-cal-next">&#8250;</button>
            </div>
            <div id="dash-mini-grid" class="dash-mini-grid"></div>
            <button class="dash-cal-all-btn" id="dash-cal-all-btn" style="display:none">← Alle Termine</button>
            <div id="events-list" class="detail-list"></div>
          </div>

        </div>
      </section>

    </main>
  </div>

  <!-- Medikament-Formular -->
  <div id="dash-med-overlay" class="dash-form-overlay hidden" role="dialog" aria-modal="true">
    <div class="dash-form-card">
      <h3 id="dash-med-form-title">Medikament hinzufügen</h3>
      <div class="form-group">
        <label for="dash-med-name">Name *</label>
        <input id="dash-med-name" type="text" placeholder="z.B. Aspirin" />
      </div>
      <div class="form-group">
        <label for="dash-med-dosage">Dosierung</label>
        <input id="dash-med-dosage" type="text" placeholder="z.B. 100 mg" />
      </div>
      <div class="form-group">
        <label for="dash-med-time">Uhrzeit</label>
        <input id="dash-med-time" type="time" value="08:00" />
      </div>
      <div class="form-group">
        <label for="dash-med-freq">Häufigkeit</label>
        <select id="dash-med-freq">
          <option value="daily">Täglich</option>
          <option value="weekly">Wöchentlich</option>
          <option value="as_needed">Bei Bedarf</option>
        </select>
      </div>
      <div class="form-group">
        <label for="dash-med-notes">Notizen</label>
        <textarea id="dash-med-notes" rows="2" placeholder="z.B. zum Essen nehmen"></textarea>
      </div>
      <div class="dash-form-actions">
        <button class="btn btn-primary" id="dash-med-save">Speichern</button>
        <button class="btn btn-secondary" id="dash-med-cancel">Abbrechen</button>
        <button class="btn btn-danger" id="dash-med-delete" style="display:none">Löschen</button>
      </div>
    </div>
  </div>

  <!-- Termin-Formular -->
  <div id="dash-cal-overlay" class="dash-form-overlay hidden" role="dialog" aria-modal="true">
    <div class="dash-form-card">
      <h3 id="dash-cal-form-title">Termin hinzufügen</h3>
      <div class="form-group">
        <label for="dash-cal-title">Titel *</label>
        <input id="dash-cal-title" type="text" placeholder="z.B. Arzttermin" />
      </div>
      <div class="form-group">
        <label for="dash-cal-date">Datum</label>
        <input id="dash-cal-date" type="date" />
      </div>
      <div class="form-group">
        <label for="dash-cal-time">Uhrzeit</label>
        <input id="dash-cal-time" type="time" value="09:00" />
      </div>
      <div class="form-group">
        <label for="dash-cal-recurring">Wiederholung</label>
        <select id="dash-cal-recurring" class="form-select">
          <option value="once">Einmalig</option>
          <option value="daily">Täglich</option>
          <option value="weekly">Wöchentlich</option>
          <option value="monthly">Monatlich</option>
          <option value="yearly">Jährlich</option>
        </select>
      </div>
      <div class="form-group hidden" id="dash-cal-end-group">
        <label for="dash-cal-end-date">Endet am</label>
        <input id="dash-cal-end-date" type="date" />
      </div>
      <div class="form-group">
        <label for="dash-cal-notes">Notizen</label>
        <textarea id="dash-cal-notes" rows="2" placeholder="z.B. Überweisung mitbringen"></textarea>
      </div>
      <div class="dash-form-actions">
        <button class="btn btn-primary" id="dash-cal-save">Speichern</button>
        <button class="btn btn-secondary" id="dash-cal-cancel">Abbrechen</button>
        <button class="btn btn-danger" id="dash-cal-delete" style="display:none">Löschen</button>
      </div>
    </div>
  </div>

  <script src="supabase.min.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
