<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2d6a4f" />
  <title>MensSana</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── LOGIN ───────────────────────────────────────── -->
  <div id="login-view">
    <div class="login-card">
      <div class="login-logo">
        <h1>MensSana</h1>
        <p>Gespräch, Orientierung und Begleitung im Alltag</p>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group hidden" id="name-group">
          <label for="name">Ihr Name</label>
          <input type="text" id="name" autocomplete="name"
                 placeholder="z.B. Anna Müller" />
        </div>
        <div class="form-group">
          <label for="email">E-Mail-Adresse</label>
          <input type="email" id="email" autocomplete="email"
                 placeholder="ihre@email.de" required />
        </div>
        <div class="form-group">
          <label for="password">Passwort</label>
          <input type="password" id="password" autocomplete="current-password"
                 placeholder="••••••••" required />
        </div>

        <button type="submit" class="btn btn-primary" id="login-btn">
          Anmelden
        </button>
        <button type="button" class="btn btn-secondary" id="signup-btn">
          Neues Konto erstellen
        </button>
        <button type="button" class="btn btn-link" id="back-to-login-btn" style="display:none">
          ← Zurück zur Anmeldung
        </button>

        <p class="status-msg" id="login-status" role="alert"></p>
      </form>
    </div>
  </div>

  <!-- ── APP ─────────────────────────────────────────── -->
  <div id="app-view">
    <header class="app-header">
      <div class="header-left">
        <button class="btn-icon" id="history-toggle-btn" title="Meine Gespräche">
          ☰
        </button>
        <h1>MensSana</h1>
      </div>
      <div class="header-right">
        <span class="header-user" id="header-user"></span>
        <span id="mood-indicator" class="mood-indicator" title="Heutige Stimmung"></span>
        <button class="btn-icon" id="new-conv-btn" title="Gespräch">
          +Gespräch
        </button>
        <button class="btn-icon" id="todo-btn">Aufgaben</button>
        <button class="btn-icon" id="meds-btn">Medikamente</button>
        <button class="btn-icon" id="cal-btn">Kalender</button>
        <button class="btn-icon" id="logout-btn">
          Abmelden
        </button>
      </div>
    </header>

    <div class="app-body">

      <!-- ── HISTORY SIDEBAR ──────────────────────────── -->
      <aside id="history-panel" class="hidden" aria-label="Gesprächsverlauf">
        <div class="history-header">
          <h2>Meine Gespräche</h2>
        </div>
        <div id="conversation-list" role="list"></div>
      </aside>

      <!-- ── CHAT ─────────────────────────────────────── -->
      <div class="chat-area">
        <div id="chat-section">
          <div id="messages" role="log" aria-live="polite" aria-label="Gespräch"></div>

          <div class="input-bar">
            <textarea
              id="message-input"
              rows="1"
              placeholder="Schreiben Sie hier …"
              aria-label="Nachricht eingeben"
            ></textarea>
            <button id="send-btn" aria-label="Senden" disabled>Senden</button>
          </div>
        </div>

        <!-- ── TO-DO ──────────────────────────────────── -->
        <div id="todo-section" class="hidden">
          <div class="meds-toolbar">
            <button class="btn-icon" id="todo-back">← Chat</button>
            <h2>Meine Aufgaben</h2>
            <button class="btn-icon" id="todo-add-list-btn">+ Liste</button>
          </div>
          <div id="todo-lists-bar" class="todo-lists-bar"></div>
          <div id="todo-items-list" class="todo-items-list"></div>
          <div class="todo-input-bar">
            <input id="todo-new-title" type="text"
                   placeholder="Neue Aufgabe eingeben …"
                   autocomplete="off" />
            <button id="todo-add-item-btn" disabled>+</button>
          </div>
        </div>

        <div id="meds-section" class="hidden">
          <div class="meds-toolbar">
            <button class="btn-icon" id="meds-back">← Chat</button>
            <h2>Meine Medikamente</h2>
            <button class="btn-icon" id="meds-add-btn">+ Hinzufügen</button>
          </div>
          <div id="meds-list"></div>
        </div>

        <div id="calendar-section" class="hidden">
          <div class="cal-toolbar">
            <button class="btn-icon" id="calendar-back">← Chat</button>
            <h2>Meine Termine</h2>
            <button class="btn-icon" id="calendar-add-btn">+ Hinzufügen</button>
          </div>
          <div class="cal-nav">
            <button class="cal-nav-btn" id="cal-prev">&#8249;</button>
            <span id="cal-period-title"></span>
            <button class="cal-nav-btn" id="cal-next">&#8250;</button>
            <div class="cal-view-tabs">
              <button class="cal-view-tab active" data-view="month">Monat</button>
              <button class="cal-view-tab" data-view="week">Woche</button>
              <button class="cal-view-tab" data-view="day">Tag</button>
            </div>
            <button class="cal-nav-btn" id="cal-expand-btn" title="Kalender vergrößern">⤢</button>
          </div>
          <div id="cal-compact"></div>
          <div id="cal-entries-list"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- Bestätigungs-Dialog -->
  <div id="confirm-overlay" class="hidden" role="dialog" aria-modal="true">
    <div class="confirm-card">
      <p id="confirm-text"></p>
      <div class="confirm-actions">
        <button class="btn-confirm-yes" id="confirm-yes">Ja</button>
        <button class="btn-confirm-no"  id="confirm-no">Abbrechen</button>
      </div>
    </div>
  </div>

  <!-- Medikament Formular -->
  <div id="med-form-overlay" class="hidden" role="dialog" aria-modal="true">
    <div class="med-form-card">
      <h3 id="med-form-title">Medikament hinzufügen</h3>
      <div class="form-group">
        <label for="med-name">Name *</label>
        <input id="med-name" type="text" placeholder="z.B. Aspirin" />
      </div>
      <div class="form-group">
        <label for="med-dosage">Dosierung</label>
        <input id="med-dosage" type="text" placeholder="z.B. 100 mg" />
      </div>
      <div class="form-group">
        <label for="med-time">Uhrzeit</label>
        <input id="med-time" type="time" value="08:00" />
      </div>
      <div class="form-group">
        <label for="med-frequency">Häufigkeit</label>
        <select id="med-frequency">
          <option value="daily">Täglich</option>
          <option value="weekly">Wöchentlich</option>
          <option value="as_needed">Bei Bedarf</option>
        </select>
      </div>
      <div class="form-group">
        <label for="med-notes">Notizen</label>
        <textarea id="med-notes" rows="2" placeholder="z.B. zum Essen nehmen"></textarea>
      </div>
      <div class="med-form-actions">
        <button class="btn btn-primary" id="med-form-save">Speichern</button>
        <button class="btn btn-secondary" id="med-form-cancel">Abbrechen</button>
      </div>
    </div>
  </div>

  <!-- Kalender Formular -->
  <div id="cal-form-overlay" class="hidden" role="dialog" aria-modal="true">
    <div class="med-form-card">
      <h3 id="cal-form-title">Termin hinzufügen</h3>
      <div class="form-group">
        <label for="cal-title">Titel *</label>
        <input id="cal-title" type="text" placeholder="z.B. Arzttermin" />
      </div>
      <div class="form-group">
        <label for="cal-date">Datum</label>
        <input id="cal-date" type="date" />
      </div>
      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" id="cal-allday" />
          Ganztägig
        </label>
      </div>
      <div class="form-group" id="cal-time-group">
        <label for="cal-time">Uhrzeit</label>
        <input id="cal-time" type="time" value="09:00" />
      </div>
      <div class="form-group">
        <label for="cal-recurring">Wiederholung</label>
        <select id="cal-recurring" class="form-select">
          <option value="once">Einmalig</option>
          <option value="daily">Täglich</option>
          <option value="weekly">Wöchentlich</option>
          <option value="monthly">Monatlich</option>
          <option value="yearly">Jährlich</option>
        </select>
      </div>
      <div class="form-group hidden" id="cal-end-group">
        <label for="cal-end-date">Endet am</label>
        <input id="cal-end-date" type="date" />
      </div>
      <div class="form-group">
        <label for="cal-notes">Notizen</label>
        <textarea id="cal-notes" rows="2" placeholder="z.B. Überweisung mitbringen"></textarea>
      </div>
      <div class="med-form-actions">
        <button class="btn btn-primary" id="cal-form-save">Speichern</button>
        <button class="btn btn-secondary" id="cal-form-cancel">Abbrechen</button>
        <button class="btn btn-danger" id="cal-form-delete" style="display:none">Löschen</button>
      </div>
    </div>
  </div>

  <!-- Kalender Vollansicht Modal -->
  <div id="cal-full-overlay" class="hidden" role="dialog" aria-modal="true">
    <div class="cal-full-inner">
      <div class="cal-full-header">
        <button class="cal-nav-btn" id="cal-full-prev">&#8249;</button>
        <span id="cal-full-title"></span>
        <button class="cal-nav-btn" id="cal-full-next">&#8250;</button>
        <button class="cal-full-close" id="cal-full-close" title="Schließen">&#10005;</button>
      </div>
      <div id="cal-full-grid"></div>
    </div>
  </div>

  <!-- Aufgabe Formular -->
  <div id="todo-form-overlay" class="hidden" role="dialog" aria-modal="true">
    <div class="med-form-card">
      <h3 id="todo-form-title">Aufgabe bearbeiten</h3>
      <div class="form-group">
        <label for="todo-form-title-input">Titel *</label>
        <input id="todo-form-title-input" type="text" placeholder="z.B. Arzt anrufen" />
      </div>
      <div class="form-group">
        <label for="todo-form-notes">Notiz</label>
        <textarea id="todo-form-notes" rows="2" placeholder="z.B. Termin wegen Blutdruck"></textarea>
      </div>
      <div class="form-group">
        <label for="todo-form-due">Fällig am</label>
        <input id="todo-form-due" type="date" />
      </div>
      <div class="form-group">
        <label for="todo-form-list">Liste</label>
        <select id="todo-form-list" class="form-select"></select>
      </div>
      <div class="med-form-actions">
        <button class="btn btn-primary" id="todo-form-save">Speichern</button>
        <button class="btn btn-secondary" id="todo-form-cancel">Abbrechen</button>
        <button class="btn btn-danger" id="todo-form-archive" style="display:none">Archivieren</button>
      </div>
    </div>
  </div>

  <!-- Supabase JS v2 (lokal, kein CDN) -->
  <script src="supabase.min.js"></script>
  <script src="app.js?v=50"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/MensSana/sw.js')
    }
  </script>
</body>
</html>
