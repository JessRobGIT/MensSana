<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2d6a4f" />
  <title>MensSana</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── LOGIN ───────────────────────────────────────── -->
  <div id="login-view">
    <div class="login-card">
      <div class="login-logo">
        <h1>MensSana</h1>
        <p>Gespräch, Orientierung und Begleitung im Alltag</p>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">E-Mail-Adresse</label>
          <input type="email" id="email" autocomplete="email"
                 placeholder="ihre@email.de" required />
        </div>
        <div class="form-group">
          <label for="password">Passwort</label>
          <input type="password" id="password" autocomplete="current-password"
                 placeholder="••••••••" required />
        </div>

        <button type="submit" class="btn btn-primary" id="login-btn">
          Anmelden
        </button>
        <button type="button" class="btn btn-secondary" id="signup-btn">
          Neues Konto erstellen
        </button>

        <p class="status-msg" id="login-status" role="alert"></p>
      </form>
    </div>
  </div>

  <!-- ── APP ─────────────────────────────────────────── -->
  <div id="app-view">
    <header class="app-header">
      <h1>MensSana</h1>
      <div class="header-right">
        <span class="header-user" id="header-user"></span>
        <button class="btn-icon" id="new-conv-btn" title="Neues Gespräch">
          + Neu
        </button>
        <button class="btn-icon" id="logout-btn">
          Abmelden
        </button>
      </div>
    </header>

    <div id="messages" role="log" aria-live="polite" aria-label="Gespräch"></div>

    <div class="input-bar">
      <textarea
        id="message-input"
        rows="1"
        placeholder="Schreiben Sie hier …"
        aria-label="Nachricht eingeben"
      ></textarea>
      <button id="send-btn" aria-label="Senden">Senden</button>
    </div>
  </div>

  <!-- Supabase JS v2 (lokal, kein CDN) -->
  <script src="supabase.min.js"></script>
  <script src="app.js?v=9"></script>
</body>
</html>
